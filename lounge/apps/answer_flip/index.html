<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="回答フリップボード - ルーム作成">
    <title>回答フリップボード - REPLAY LIVE LOUNGE</title>
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="./css/answer_flip.css">
</head>

<body>
    <div class="af-page page-fade-in" id="setupPage">

        <!-- ヘッダー -->
        <header class="af-header">
            <div class="af-header-left">
                <a href="../menu/index.html" class="back-btn">← メニュー</a>
                <span class="logo-mini">REPLAY LIVE LOUNGE</span>
            </div>
        </header>

        <div class="af-page-inner">
            <div class="af-setup">

                <!-- ヒーロー -->
                <div class="af-setup-hero">
                    <h1>📝 回答フリップボード</h1>
                    <p>回答を一斉にフリップ！クイズ・大喜利企画に最適。</p>
                </div>

                <!-- 設定パネル -->
                <div class="af-panel">
                    <div class="af-section-title"><span class="icon">⚙️</span> ルーム設定</div>

                    <!-- ホスト参加 -->
                    <label class="af-label">ホストは回答に参加しますか？</label>
                    <div class="af-toggle-group mb-16" id="hostJoinToggle">
                        <button class="af-toggle active" data-value="yes">YES</button>
                        <button class="af-toggle" data-value="no">NO</button>
                    </div>

                    <!-- ホスト名 -->
                    <div id="hostNameArea" class="mb-16">
                        <label class="af-label">ホスト名</label>
                        <input type="text" class="af-input" id="hostNameInput" placeholder="ホストの名前" maxlength="12">
                    </div>

                    <!-- 参加者名入力 -->
                    <label class="af-label">参加者名（最大6名）</label>
                    <div id="nameInputArea"></div>

                    <button class="af-btn af-btn--secondary af-btn--small mt-8" id="addNameBtn">＋ 参加者を追加</button>

                    <!-- ルーム作成ボタン -->
                    <div class="mt-32">
                        <button class="af-btn af-btn--full" id="createRoomBtn">ルームを作成</button>
                    </div>
                </div>

                <!-- URL発行エリア（ルーム作成後に表示） -->
                <div class="af-panel hidden" id="urlPanel">
                    <div class="af-section-title"><span class="icon">🔗</span> 共有URL</div>
                    <p style="font-size:0.8rem;color:var(--color-text-dim);margin-bottom:16px;">
                        各参加者に対応するURLを共有してください。<br>
                        <span style="color:var(--color-yellow);">※ 現在はローカル検証用MVP: 同一ブラウザの別タブで開いてください</span>
                    </p>
                    <div id="urlList" class="af-url-list"></div>

                    <!-- 表示専用URL -->
                    <div class="mt-24">
                        <label class="af-label">📺 表示専用URL（OBS用）</label>
                        <div class="af-url-item" id="displayUrlItem">
                            <span class="name">Display</span>
                            <span class="url" id="displayUrl"></span>
                            <button class="copy-btn" id="copyDisplayUrl">コピー</button>
                        </div>
                    </div>

                    <!-- ホスト操作画面へ -->
                    <div class="mt-32 text-center">
                        <button class="af-btn" id="goHostBtn">ホスト操作画面へ →</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="./js/answer_flip_common.js"></script>
    <script>
        // ============================================================
        // 回答フリップボード — セットアップ画面
        // ============================================================
        (function () {
            'use strict';

            var hostJoins = true;
            var nameInputs = [];
            var roomStore = null;

            // ---- ホスト参加トグル ----
            var toggleBtns = document.querySelectorAll('#hostJoinToggle .af-toggle');
            toggleBtns.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    toggleBtns.forEach(function (b) { b.classList.remove('active'); });
                    btn.classList.add('active');
                    hostJoins = btn.dataset.value === 'yes';
                    document.getElementById('hostNameArea').classList.toggle('hidden', !hostJoins);
                    updateNameSlots();
                });
            });

            // ---- 名前入力行の管理 ----
            var nameArea = document.getElementById('nameInputArea');
            var maxPlayers = 6;

            function updateNameSlots() {
                // ホスト参加分を引いた最大数
                var maxOther = hostJoins ? maxPlayers - 1 : maxPlayers;
                // 超過分を削除
                while (nameInputs.length > maxOther) {
                    nameInputs.pop();
                }
                renderNameInputs();
            }

            function renderNameInputs() {
                nameArea.innerHTML = '';
                nameInputs.forEach(function (val, i) {
                    var row = document.createElement('div');
                    row.className = 'af-name-row';

                    var slotNum = document.createElement('span');
                    slotNum.className = 'slot-num';
                    slotNum.textContent = (hostJoins ? i + 2 : i + 1);
                    row.appendChild(slotNum);

                    var input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'af-input';
                    input.placeholder = '参加者 ' + (i + 1) + ' の名前';
                    input.maxLength = 12;
                    input.value = val;
                    input.addEventListener('input', function () {
                        nameInputs[i] = input.value;
                    });
                    row.appendChild(input);

                    var removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-btn';
                    removeBtn.textContent = '×';
                    removeBtn.addEventListener('click', function () {
                        nameInputs.splice(i, 1);
                        renderNameInputs();
                    });
                    row.appendChild(removeBtn);

                    nameArea.appendChild(row);
                });

                // 追加ボタンの有効/無効
                var maxOther = hostJoins ? maxPlayers - 1 : maxPlayers;
                document.getElementById('addNameBtn').disabled = nameInputs.length >= maxOther;
            }

            // 初期表示: 1行
            nameInputs.push('');
            renderNameInputs();

            document.getElementById('addNameBtn').addEventListener('click', function () {
                var maxOther = hostJoins ? maxPlayers - 1 : maxPlayers;
                if (nameInputs.length < maxOther) {
                    nameInputs.push('');
                    renderNameInputs();
                }
            });

            // ---- ルーム作成 ----
            document.getElementById('createRoomBtn').addEventListener('click', function () {
                var participants = [];

                // ホスト参加の場合
                if (hostJoins) {
                    var hostName = document.getElementById('hostNameInput').value.trim() || 'ホスト';
                    participants.push({ name: hostName, role: 'host' });
                }

                // 参加者
                nameInputs.forEach(function (name) {
                    var n = name.trim();
                    if (n) {
                        participants.push({ name: n, role: 'player' });
                    }
                });

                if (participants.length === 0) {
                    alert('参加者を1名以上入力してください。');
                    return;
                }

                // RoomStore 作成
                var roomId = AnswerFlip.generateId(8);
                var adapter = new AnswerFlip.LocalSyncAdapter(roomId);
                roomStore = new AnswerFlip.RoomStore({
                    syncAdapter: adapter,
                    role: 'host',
                    roomId: roomId
                });

                // SETUP_ROOM
                roomStore.dispatch({
                    type: 'SETUP_ROOM',
                    payload: { participants: participants }
                });

                // URL生成
                var state = roomStore.getState();
                var baseUrl = window.location.href.replace(/\/index\.html.*/, '/');
                var urlList = document.getElementById('urlList');
                urlList.innerHTML = '';

                state.participants.forEach(function (pt) {
                    var url = baseUrl + 'player.html?room=' + roomId + '&slot=' + pt.slotIndex;

                    var item = document.createElement('div');
                    item.className = 'af-url-item';
                    item.innerHTML =
                        '<span class="status-dot" id="dot_' + pt.slotIndex + '"></span>' +
                        '<span class="name">' + pt.name + (pt.role === 'host' ? ' 🎤' : '') + '</span>' +
                        '<span class="url">' + url + '</span>' +
                        '<button class="copy-btn" data-url="' + url + '">コピー</button>';
                    urlList.appendChild(item);
                });

                // コピーボタン
                urlList.querySelectorAll('.copy-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        navigator.clipboard.writeText(btn.dataset.url).then(function () {
                            btn.textContent = 'コピー済み';
                            setTimeout(function () { btn.textContent = 'コピー'; }, 1500);
                        });
                    });
                });

                // Display URL
                var displayUrl = baseUrl + 'display.html?room=' + roomId;
                document.getElementById('displayUrl').textContent = displayUrl;
                document.getElementById('copyDisplayUrl').addEventListener('click', function () {
                    navigator.clipboard.writeText(displayUrl).then(function () {
                        document.getElementById('copyDisplayUrl').textContent = 'コピー済み';
                        setTimeout(function () { document.getElementById('copyDisplayUrl').textContent = 'コピー'; }, 1500);
                    });
                });

                // パネル表示切替
                document.querySelector('.af-panel:not(#urlPanel)').style.opacity = '0.5';
                document.querySelector('.af-panel:not(#urlPanel)').style.pointerEvents = 'none';
                document.getElementById('urlPanel').classList.remove('hidden');

                // ホスト操作画面への遷移
                document.getElementById('goHostBtn').addEventListener('click', function () {
                    window.location.href = 'host.html?room=' + roomId;
                });

                // 入室状態の監視
                roomStore.subscribe(function (s) {
                    s.participants.forEach(function (pt) {
                        var dot = document.getElementById('dot_' + pt.slotIndex);
                        if (dot) {
                            dot.className = 'status-dot ' + pt.status;
                        }
                    });
                });
            });

        })();
    </script>
</body>

</html>
